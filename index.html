<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>會員專屬禮品預約系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    .dropdown-content { display: none; }
    .dropdown-content.show { display: block; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-6 space-y-6">
    <div class="text-center">
      <h1 class="text-2xl font-bold text-gray-800">🎁 禮品領取預約</h1>
      <p class="text-sm text-gray-500 mt-1">每位會員限預約領取一次</p>
    </div>

    <form id="reservationForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">會員姓名</label>
        <input type="text" id="username" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none" placeholder="請輸入姓名">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">電話後 3 碼</label>
        <input type="text" id="phoneTail" required maxlength="3" pattern="\d{3}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none" placeholder="例如：123">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">預計領取日期</label>
        <input type="date" id="pickupDate" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">預計領取時間</label>
        <select id="pickupTime" required class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-emerald-500 focus:outline-none text-gray-700">
          <option value="" disabled selected>請選擇領取時間...</option>
          <option value="10:00">10:00</option>
          <option value="11:00">11:00</option>
          <option value="13:00">13:00</option>
          <option value="14:00">14:00</option>
          <option value="15:00">15:00</option>
          <option value="16:00">16:00</option>
          <option value="17:00">17:00</option>
        </select>
      </div>

      <div class="relative">
        <label class="block text-sm font-medium text-gray-700 mb-1">選擇禮品品項</label>
        <div id="dropdownBtn" class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-white flex items-center justify-between cursor-pointer select-none">
          <span id="selectedOptionText" class="text-gray-400">請選擇禮品...</span>
          <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </div>
        <div id="dropdownContent" class="dropdown-content absolute left-0 right-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-lg z-50 max-h-60 overflow-y-auto"></div>
        <input type="hidden" id="selectedGiftId" required>
      </div>

      <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-lg transition-colors shadow-md">
        確認預約
      </button>
    </form>
  </div>

  <div id="statusModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-xl p-6 max-w-sm w-full text-center space-y-4 shadow-2xl">
      <div id="modalIcon" class="text-4xl">⚠️</div>
      <h2 id="modalTitle" class="text-lg font-bold text-gray-800">提示訊息</h2>
      <p id="modalMsg" class="text-sm text-gray-600 leading-relaxed"></p>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://inozwjvbxsxgdknojeej.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_701jaFWbPUtmHC349aVZyA_L9iFSrB8";
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentLineUserId = null; 
    let selectedGift = null;

    // ✨ 優化後的啟動邏輯：一載入就立刻抓禮品！
    document.addEventListener("DOMContentLoaded", async () => {
      
      // 1. 強制第一步：先去 Supabase 撈商品，確保不管什麼環境選單都能點開
      await loadGifts();
      document.getElementById('pickupDate').min = new Date().toISOString().split('T')[0];

      // 2. 第二步：在背景初始化 LINE Mini App 身分
      liff.ready
        .then(async () => {
          if (!liff.isLoggedIn()) {
            liff.login();
            return;
          }

          const profile = await liff.getProfile();
          currentLineUserId = profile.userId;

          // 自動填入 LINE 暱稱
          document.getElementById("username").value = profile.displayName;

          // 檢查該會員有沒有重複預約
          await checkUserReservation();
        })
        .catch((err) => {
          console.error("Mini App 環境初始化失敗，切換至相容測試模式:", err);
          // 防呆機制：若不在 LINE 內開啟，給予預設測試 ID 允許功能測試
          currentLineUserId = "U1234567890_TEST_USER";
        });
    });

    async function checkUserReservation() {
      if (!currentLineUserId) return;
      const { data, error } = await supabase
        .from('reservations')
        .select('id')
        .eq('line_user_id', currentLineUserId)
        .maybeSingle();

      if (data) {
        showModal("⚠️", "您已預約", "您已預約，如有問題請洽官方帳號。");
        document.getElementById("reservationForm").innerHTML = `<div class="text-center py-8 text-red-500 font-medium">您已完成預約，表單已關閉。</div>`;
      }
    }

    async function loadGifts() {
      const { data: gifts, error } = await supabase.from('gifts').select('*');
      if (error) return console.error("撈取禮品失敗:", error);

      const dropdownContent = document.getElementById("dropdownContent");
      dropdownContent.innerHTML = "";

      gifts.forEach(gift => {
        const isOut = gift.stock <= 0;
        const item = document.createElement("div");
        item.className = `flex items-center gap-3 p-3 hover:bg-gray-50 cursor-pointer border-b last:border-0 ${isOut ? 'opacity-50 pointer-events-none bg-gray-100' : ''}`;
        
        item.innerHTML = `
          <img src="${gift.image_url || 'https://placeholder.com/150'}" class="w-12 h-12 object-cover rounded-md" alt="${gift.name}">
          <div class="flex-1">
            <div class="font-medium text-gray-800">${gift.name}</div>
            <div class="text-xs text-gray-500">領取地點：${gift.location}</div>
          </div>
          <div class="text-xs font-bold ${isOut ? 'text-red-500' : 'text-emerald-600'}">
            ${isOut ? '已售完' : `剩餘 ${gift.stock}`}
          </div>
        `;

        if (!isOut) {
          item.addEventListener("click", () => {
            selectGift(gift);
          });
        }
        dropdownContent.appendChild(item);
      });
    }

    function selectGift(gift) {
      selectedGift = gift;
      document.getElementById("selectedGiftId").value = gift.id;
      document.getElementById("selectedOptionText").innerHTML = `
        <div class="flex items-center gap-2 text-left">
          <img src="${gift.image_url || 'https://placeholder.com/150'}" class="w-6 h-6 object-cover rounded">
          <span class="text-gray-800 font-medium text-sm">${gift.name}</span>
        </div>
      `;
      toggleDropdown();
    }

    const dropdownBtn = document.getElementById("dropdownBtn");
    const dropdownContent = document.getElementById("dropdownContent");
    dropdownBtn.addEventListener("click", toggleDropdown);
    
    function toggleDropdown() {
      dropdownContent.classList.toggle("show");
    }

    window.addEventListener("click", (e) => {
      if (!dropdownBtn.contains(e.target) && !dropdownContent.contains(e.target)) {
        dropdownContent.classList.remove("show");
      }
    });

    document.getElementById("reservationForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("username").value;
      const phoneTail = document.getElementById("phoneTail").value;
      const pickupDate = document.getElementById("pickupDate").value;
      const pickupTime = document.getElementById("pickupTime").value;
      const giftId = document.getElementById("selectedGiftId").value;

      if (!giftId) {
        alert("請選擇禮品品項！");
        return;
      }

      const { data: result, error } = await supabase.rpc('submit_reservation', {
        p_line_id: currentLineUserId,
        p_name: name,
        p_phone: phoneTail,
        p_gift_id: parseInt(giftId),
        p_date: pickupDate,
        p_time: pickupTime
      });

      if (error) {
        showModal("❌", "系統錯誤", "預約失敗，請稍後再試。");
        return;
      }

      if (result === 'ALREADY_RESERVED') {
        showModal("⚠️", "您已預約", "您已預約，如有問題請洽官方帳號。");
      } else if (result === 'OUT_OF_STOCK') {
        showModal("❌", "庫存不足", "該禮品剛剛已被搶光，請選擇其他禮品。");
        loadGifts(); 
      } else if (result === 'SUCCESS') {
        showModal("🎉", "預約成功！", `預約完成！通知已寄送至您的 LINE 官方帳號。<br><br><b>領取日期：</b>${pickupDate} ${pickupTime}<br><b>領取地點：</b>${selectedGift.location}<br><b>修改日期請撥打客服電話。</b>`);

        const gasUrl = "https://script.google.com/macros/s/AKfycbzb7pkmEKoxi2K4xwqPIZAH-oNZqLwRBHovIuyasuJmPIJt2EX_ogx1aVj84Buwyh7-/exec";
        
        fetch(gasUrl, {
          method: "POST",
          body: JSON.stringify({
            line_user_id: currentLineUserId,
            name: name,
            phone_tail: phoneTail,
            gift_name: selectedGift.name,
            pickup_date: pickupDate,
            pickup_time: pickupTime,
            location: selectedGift.location
          })
        })
        .then(res => res.json())
        .then(data => console.log("LINE 通知發送結果:", data))
        .catch(err => console.error("LINE 通知發送失敗:", err));
        
        document.getElementById("reservationForm").innerHTML = `<div class="text-center py-8 text-emerald-600 font-medium">預約成功！畫面已鎖定。</div>`;
      }
    });

    function showModal(icon, title, msg) {
      document.getElementById("modalIcon").innerHTML = icon;
      document.getElementById("modalTitle").innerHTML = title;
      document.getElementById("modalMsg").innerHTML = msg;
      document.getElementById("statusModal").classList.remove("hidden");
    }
  </script>
</body>
</html>
